stages:
  - lint
  - format
  - type_check
  - test
  - coverage

lint:
  stage: lint
  image: python:3.11
  before_script:
    - pip install ruff
  script:
    - ruff check .

format:
  stage: format
  image: python:3.11
  before_script:
    - pip install ruff
  script:
    - ruff format --check . || true

type_check:
  stage: type_check
  image: python:3.11
  script:
    - echo "Mypy check placeholder"

test:
  stage: test
  image: python:3.11
  before_script:
    - pip install pytest
  script:
    - pytest test_basic.py

coverage:
  stage: coverage
  image: python:3.11
  script:
    - echo "Coverage placeholder"