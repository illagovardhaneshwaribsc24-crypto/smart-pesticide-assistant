stages:
  - lint
  - format
  - type_check
  - test
  - coverage

lint:
  stage: lint
  image: python:3.11
  before_script:
    - pip install ruff
  script:
    - ruff check .

format:
  stage: format
  image: python:3.11
  before_script:
    - pip install ruff
  script:
    - ruff format --check .

type_check:
  stage: type_check
  image: python:3.11
  before_script:
    - pip install -r requirements.txt
    - pip install mypy pandas-stubs
  script:
    - mypy backend

test:
  stage: test
  image: python:3.11
  before_script:
    - pip install pytest
  script:
    - pytest test_basic.py

coverage:
  stage: coverage
  image: python:3.11
  before_script:
    - pip install pytest pytest-cov
  script:
    - pytest --cov=. --cov-fail-under=1

secret_scan:
  stage: test
  image: python:3.11
  before_script:
    - pip install detect-secrets
  script:
    - detect-secrets scan .

dependency_audit:
  stage: test
  image: python:3.11
  before_script:
    - pip install pip-audit
    - pip install -r requirements.txt
  script:
    - pip-audit